<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KP TV - Smart Player</title>
  <link rel="stylesheet" href="style.css">
  
  <!-- Shaka Player for DRM & HLS/Dash support -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.1/shaka-player.ui.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.1/controls.min.css">

  <style>
    body {
      background-color: var(--bg-dark, #07090b);
      color: white;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      font-family: 'Rajdhani', sans-serif;
    }
    .player-header {
      background-color: #0b0e12;
      border-bottom: 1px solid #1e2730;
      padding: 10px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 60px;
    }
    .player-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }
    .player-brand svg {
      width: 28px;
      fill: #00ff66;
    }
    .player-title-text {
      font-size: 22px;
      font-weight: 700;
      color: #f0f4f8;
    }
    .player-actions {
      display: flex;
      gap: 10px;
    }
    .btn {
      background: #192026;
      color: #f0f4f8;
      border: 1px solid #1e2730;
      padding: 6px 15px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: 0.2s;
    }
    .btn:hover {
      background: #00ff66;
      color: #000;
      border-color: #00ff66;
    }
    .video-container {
      flex: 1;
      width: 100%;
      background: #000;
      position: relative;
    }
    video {
      width: 100%;
      height: 100%;
    }
    .loading-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: #000;
      z-index: 10;
      color: #00ff66;
      font-size: 20px;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(0, 255, 102, 0.2);
      border-top-color: #00ff66;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 15px;
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="player-header">
    <a href="index.html" class="player-brand">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>
      <span class="player-title-text">KP TV Smart Player</span>
    </a>
    <div class="player-actions">
      <button class="btn" onclick="location.reload()">Refresh Stream</button>
      <button class="btn" onclick="window.close()">Close</button>
    </div>
  </div>

  <!-- Video Area -->
  <div class="video-container" data-shaka-player-container>
    <div class="loading-overlay" id="loader">
      <div class="spinner"></div>
      <span id="loaderText">Resolving Stream...</span>
    </div>
    <video id="videoElement" data-shaka-player autoplay></video>
  </div>

  <script>
    const loader = document.getElementById('loader');
    const loaderText = document.getElementById('loaderText');
    const video = document.getElementById('videoElement');

    async function resolveStreamURL(url) {
      try {
        // Step 1: If it's a LINK2 wrapper, fetch it and extract the real channel link
        if (url.includes('LINK2?id=')) {
          loaderText.innerText = 'Bypassing security wrapper...';
          const res = await fetch(url);
          const html = await res.text();
          const idMatch = url.match(/id=([^&]+)/);
          if (idMatch) {
            const regex = new RegExp(idMatch[1] + '\\s*:\\s*["\']([^"\']+)["\']');
            const match = html.match(regex);
            if (match && match[1]) {
              url = match[1];
            }
          }
        }

        // Step 2: Extract real stream from known Yonotv player patterns
        if (url.includes('plyrr?src=') || url.includes('cplyrr?src=') || url.includes('jwplyrr?src=')) {
           return { rawUrl: new URL(url).searchParams.get('src') };
        }

        // Step 3: If it's a DRM-protected channel (like fox1, tsn1), extract DRM keys
        if (url.includes('fox1') || url.includes('tsn1') || url.includes('fifawtv') || url.includes('itv1') || url.includes('dsports') || url.includes('m6') || url.includes('fifa')) {
          loaderText.innerText = 'Extracting DRM Keys...';
          const res = await fetch(url);
          const html = await res.text();
          
          const mpdMatch = html.match(/const\s+mpdUrl\s*=\s*['"]([^'"]+)['"]/);
          const kidMatch = html.match(/const\s+kid\s*=\s*['"]([^'"]+)['"]/);
          const keyMatch = html.match(/const\s+key\s*=\s*['"]([^'"]+)['"]/);
          
          if (mpdMatch) {
            return {
              rawUrl: mpdMatch[1],
              drm: (kidMatch && keyMatch) ? { kid: kidMatch[1], key: keyMatch[1] } : null
            };
          }
        }

        // Fallback: assume the URL itself is the raw stream
        return { rawUrl: url };
      } catch (err) {
        console.error("Resolver Error:", err);
        return { rawUrl: url };
      }
    }

    async function initPlayer() {
      // Get URL from Hash or Query
      let src = null;
      if (window.location.hash.startsWith('#src=')) {
        src = window.location.hash.substring(5);
      } else {
        const urlParams = new URLSearchParams(window.location.search);
        src = urlParams.get('src');
      }

      if (!src) {
        loader.innerHTML = '<span style="color:#ff3366">Error: No stream source provided.</span>';
        return;
      }

      // Install Shaka polyfills
      shaka.polyfill.installAll();
      if (!shaka.Player.isBrowserSupported()) {
        loader.innerHTML = '<span style="color:#ff3366">Browser not supported for video streaming.</span>';
        return;
      }

      // Resolve the stream to bypass anti-embed scripts
      const streamInfo = await resolveStreamURL(src);
      
      if (!streamInfo.rawUrl) {
        loader.innerHTML = '<span style="color:#ff3366">Error: Could not resolve stream.</span>';
        return;
      }

      loaderText.innerText = 'Loading Video Engine...';
      
      const player = new shaka.Player(video);
      
      // Apply DRM if extracted
      if (streamInfo.drm) {
        player.configure({
          drm: {
            clearKeys: {
              [streamInfo.drm.kid]: streamInfo.drm.key
            }
          }
        });
      }

      try {
        await player.load(streamInfo.rawUrl);
        loader.style.display = 'none';
        video.play().catch(e => console.log('Autoplay prevented', e));
      } catch (err) {
        console.error('Error loading video', err);
        loader.innerHTML = '<span style="color:#ff3366">Error loading stream format.</span>';
      }
    }

    document.addEventListener('DOMContentLoaded', initPlayer);
  </script>
</body>
</html>
