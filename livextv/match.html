<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
  <title>Match Details — LiveXTV</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Navigation -->
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="brand">
        <svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>
        <span>LiveXTV <em>World Cup</em></span>
      </a>
      <a href="index.html" class="back-link">← Back to Matches</a>
    </div>
  </nav>

  <main class="match-view">
    <div class="match-details-header">
      <div class="match-info">
        <span class="league-badge" id="m-league">FIFA World Cup</span>
        <h1 id="m-title">Loading Match...</h1>
        <p class="match-meta" id="m-meta">Loading stadium and time...</p>
      </div>
      <div class="match-status">
        <div class="live-indicator"><div class="dot"></div> Live</div>
      </div>
    </div>

    <div class="streams-container">
      <h3>Available HD Streams</h3>
      <div id="telecast-links" class="stream-links-grid">
        <div class="loading-state">Resolving secure streams...</div>
      </div>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
