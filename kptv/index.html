<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KPTV - Live Channels</title>
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="stylesheet" href="channels.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet">
</head>

<body>

  <!-- Navigation -->
  <nav class="navbar">
    <div class="nav-brand">
      <img src="logo.png" class="logo-img" alt="KP Logo">
      <span>KPTV <strong>LIVE</strong></span>
    </div>
    <div class="nav-controls">
      <button id="themeToggle" class="theme-toggle" aria-label="Toggle Theme">
        <!-- Sun icon (shows in dark mode) -->
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"></circle>
          <line x1="12" y1="1" x2="12" y2="3"></line>
          <line x1="12" y1="21" x2="12" y2="23"></line>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
          <line x1="1" y1="12" x2="3" y2="12"></line>
          <line x1="21" y1="12" x2="23" y2="12"></line>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
        <!-- Moon icon (shows in light mode) -->
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
      </button>
      <div class="nav-search">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input type="text" id="searchInput" placeholder="Search channels (e.g. beIN, Willow, Fox)...">
      </div>
    </div>
  </nav>

  <!-- Compact Header Section -->
  <header class="hero compact">
    <div class="hero-content">
      <img src="fifa26.png" class="hero-fifa-logo" alt="FIFA World Cup 2026">
      <div class="hero-text-wrapper">
        <div class="live-badge">
          <div class="live-dot"></div> DIRECT BROADCAST
        </div>
        <h1>Watch Live Sports <span>Free in HD</span></h1>
        <p>Watch World Cup 2026 for completely free. No ads, no popups.</p>
      </div>
    </div>
  </header>

  <!-- Channels Directory -->
  <main class="directory-main">

    <!-- Football Category -->
    <section class="category-section">
      <div class="category-header">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <path d="M12 17l-4.5-3.5 1.5-6h6l1.5 6L12 17z"></path>
          <path d="M12 17v5"></path>
          <path d="M7.5 13.5L2 15"></path>
          <path d="M16.5 13.5L22 15"></path>
          <path d="M9 7.5L5 3"></path>
          <path d="M15 7.5l4-4.5"></path>
        </svg>
        <h2>Football Channels</h2>
      </div>
      <div class="channel-grid" id="footballGrid">
        <!-- Injected via JS -->
      </div>
    </section>

    <!-- Cricket Category (Currently Hidden) -->
    <!--
    <section class="category-section">
      <div class="category-header" style="margin-top: 40px;">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z" />
        </svg>
        <h2>Cricket Networks</h2>
      </div>
      <div class="channel-grid" id="cricketGrid">
      </div>
    </section>
    -->

  </main>

  <!-- Footer -->
  <footer class="site-footer">
    <p>Developed by Keshav Poudel</p>
  </footer>

  <script src="channels.js"></script>
</body>

</html>
