<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Native KPTV Player</title>
  
  <!-- Shaka Player Dependencies -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.1/shaka-player.ui.min.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.1/controls.min.css" crossorigin="anonymous">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  
  <style>
    body { margin: 0; padding: 0; background: #000; color: #fff; font-family: 'Outfit', sans-serif; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
    
    .player-header {
      background: rgba(17, 17, 17, 0.9); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid #333; z-index: 100; position: absolute; top: 0; left: 0; right: 0; backdrop-filter: blur(8px);
    }
    .back-btn { color: #fff; text-decoration: none; font-weight: 600; display: flex; align-items: center; gap: 8px; transition: color 0.2s; }
    .back-btn:hover { color: #f51343; }
    .channel-title { font-size: 18px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
    .live-tag { background: #f51343; color: #fff; font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 800; letter-spacing: 1px; }
    
    .player-container {
      flex: 1; position: relative; background: #000; margin-top: 60px;
    }
    [data-shaka-player-container] {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover;
    }
    video { width: 100%; height: 100%; object-fit: contain; }
    
    /* Hide the default Shaka spinner to prevent it from getting stuck on screen */
    .shaka-spinner-container {
        display: none !important;
    }

    /* Hide the giant live stream time numbers */
    .shaka-current-time, 
    .shaka-time-container {
        display: none !important;
    }
  </style>
</head>
<body>

  <div class="player-header">
    <a href="index.html" class="back-btn">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      Back to Directory
    </a>
    <div class="channel-title">
      <span id="cName">Initializing Stream...</span>
      <span class="live-tag">LIVE</span>
    </div>
  </div>

  <div class="player-container">
    <div data-shaka-player-container>
      <video autoplay playsinline data-shaka-player id="video"></video>
    </div>
  </div>

  <script src="channels.js"></script>
  <script>
    (function() {
      // 1. Extract short ID from URL
      const urlParams = new URLSearchParams(window.location.search);
      const chId = urlParams.get('id');

      // 2. Find channel in our database
      const channel = typeof channelsData !== 'undefined' ? channelsData.find(c => c.icon === chId) : null;

      if (!channel || !channel.mpd || !channel.kid || !channel.key) {
        document.getElementById('cName').textContent = "Error Loading Channel";
        document.querySelector('.player-container').innerHTML = '<h2 style="text-align:center;margin-top:50px;">Invalid Channel ID or Missing DRM Keys</h2>';
        return;
      }

      document.getElementById('cName').textContent = channel.name;

      const mpdUrl = channel.mpd;
      const kid = channel.kid;
      const key = channel.key;

      let player = null;
      let ui = null;
      const video = document.getElementById('video');

      function initShakaPlayer() {
        shaka.polyfill.installAll();
        
        shaka.Player.probeSupport().then(() => {
          player = new shaka.Player(video);
          
          // Inject our extracted DRM keys!
          const drmConfig = {
            drm: { clearKeys: { [kid]: key } }
          };
          player.configure(drmConfig);
          
          // Load the actual video file natively
          player.load(mpdUrl).then(() => {
            console.log('Stream loaded natively via KPTV Engine');
            video.play().catch(e => console.log('Autoplay blocked, waiting for user interaction'));
          }).catch(err => {
            console.error('Player load error', err);
          });
          
          // Setup UI
          const container = document.querySelector('[data-shaka-player-container]');
          if (container) {
            ui = new shaka.ui.Overlay(player, container, video);
          }
          
        }).catch(err => {
          console.error('Shaka probe error', err);
        });
      }

      // Start player
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initShakaPlayer);
      } else {
        initShakaPlayer();
      }
    })();
  </script>
</body>
</html>
