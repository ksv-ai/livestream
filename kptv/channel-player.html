<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
  <title>KPTV Player</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { margin: 0; padding: 0; background: #000; color: #fff; font-family: 'Outfit', sans-serif; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
    
    .player-header {
      background: #111; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid #333; z-index: 10;
    }
    .back-btn {
      color: #fff; text-decoration: none; font-weight: 600; display: flex; align-items: center; gap: 8px; transition: color 0.2s;
    }
    .back-btn:hover { color: #f51343; }
    .channel-title { font-size: 18px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
    .live-tag { background: #f51343; color: #fff; font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 800; letter-spacing: 1px; }
    
    .player-container {
      flex: 1; position: relative; background: #000;
    }
    iframe {
      width: 100%; height: 100%; border: none; position: absolute; inset: 0;
    }
  </style>
</head>
<body>

  <div class="player-header">
    <a href="channels.html" class="back-btn">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      Back to Directory
    </a>
    <div class="channel-title">
      <span id="cName">Loading...</span>
      <span class="live-tag">LIVE</span>
    </div>
  </div>

  <div class="player-container">
    <iframe id="videoFrame" allowfullscreen="true" allow="encrypted-media; autoplay"></iframe>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const srcBase64 = urlParams.get('src');
    const name = urlParams.get('name');

    if (name) document.getElementById('cName').textContent = name;
    
    if (srcBase64) {
      const srcUrl = atob(srcBase64);
      document.getElementById('videoFrame').src = srcUrl;
    } else {
      document.body.innerHTML = '<h2 style="text-align:center;margin-top:50px;">Invalid Stream Source</h2>';
    }
  </script>
</body>
</html>
